<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Saloni's Placement Prep</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --card: #12121a;
    --card2: #1a1a26;
    --border: #2a2a3a;
    --accent1: #7c3aed;
    --accent2: #06b6d4;
    --accent3: #f59e0b;
    --accent4: #10b981;
    --accent5: #f43f5e;
    --text: #e2e8f0;
    --muted: #64748b;
    --done: #10b981;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    top: -50%;
    left: -50%;
    width: 200%;
    height: 200%;
    background: radial-gradient(ellipse at 20% 20%, rgba(124,58,237,0.08) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 80%, rgba(6,182,212,0.06) 0%, transparent 50%),
                radial-gradient(ellipse at 50% 50%, rgba(16,185,129,0.04) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  .container {
    max-width: 900px;
    margin: 0 auto;
    padding: 0 20px 80px;
    position: relative;
    z-index: 1;
  }

  header {
    text-align: center;
    padding: 60px 0 40px;
    position: relative;
  }

  header h1 {
    font-family: 'Syne', sans-serif;
    font-size: clamp(2rem, 6vw, 3.5rem);
    font-weight: 800;
    background: linear-gradient(135deg, #7c3aed, #06b6d4, #f59e0b);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    letter-spacing: -1px;
    line-height: 1.1;
  }

  header p {
    color: var(--muted);
    font-size: 1rem;
    margin-top: 10px;
    font-weight: 300;
    letter-spacing: 0.5px;
  }

  .progress-bar-outer {
    background: var(--border);
    border-radius: 100px;
    height: 10px;
    overflow: hidden;
    margin: 24px 0 8px;
  }

  .progress-bar-inner {
    height: 100%;
    border-radius: 100px;
    background: linear-gradient(90deg, #7c3aed, #06b6d4);
    transition: width 0.5s cubic-bezier(0.4,0,0.2,1);
    position: relative;
    overflow: hidden;
  }

  .progress-bar-inner::after {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
    animation: shimmer 2s infinite;
  }

  @keyframes shimmer {
    0% { transform: translateX(-100%); }
    100% { transform: translateX(100%); }
  }

  .progress-stats {
    display: flex;
    justify-content: space-between;
    font-size: 0.82rem;
    color: var(--muted);
    margin-top: 6px;
  }

  .progress-count {
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 1.1rem;
    color: var(--accent2);
  }

  .section-tabs {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    justify-content: center;
    margin: 36px 0 24px;
  }

  .tab-btn {
    background: var(--card);
    border: 1px solid var(--border);
    color: var(--muted);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.85rem;
    font-weight: 500;
    padding: 8px 18px;
    border-radius: 100px;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    gap: 7px;
  }

  .tab-btn:hover { border-color: var(--accent1); color: var(--text); }

  .tab-btn.active { color: #fff; border-color: transparent; }
  .tab-btn.active[data-section="all"] { background: linear-gradient(135deg, #7c3aed, #06b6d4); }
  .tab-btn.active[data-section="prob"] { background: linear-gradient(135deg, #7c3aed, #a855f7); }
  .tab-btn.active[data-section="stats"] { background: linear-gradient(135deg, #06b6d4, #0ea5e9); }
  .tab-btn.active[data-section="sql"] { background: linear-gradient(135deg, #f59e0b, #f97316); }
  .tab-btn.active[data-section="python"] { background: linear-gradient(135deg, #10b981, #059669); }
  .tab-btn.active[data-section="ml"] { background: linear-gradient(135deg, #f43f5e, #ec4899); }
  .tab-btn.active[data-section="dsa"] { background: linear-gradient(135deg, #6366f1, #8b5cf6); }
  .tab-btn.active[data-section="sqlprobs"] { background: linear-gradient(135deg, #f59e0b, #f97316); }

  .tab-count {
    background: rgba(255,255,255,0.15);
    padding: 1px 7px;
    border-radius: 100px;
    font-size: 0.75rem;
  }

  /* Topic cards (non-DSA) */
  .topics-list { display: flex; flex-direction: column; gap: 10px; }

  .section-header {
    font-family: 'Syne', sans-serif;
    font-size: 1.3rem;
    font-weight: 700;
    padding: 28px 0 8px;
    display: flex;
    align-items: center;
    gap: 12px;
    letter-spacing: -0.3px;
  }

  .section-header .dot {
    width: 12px; height: 12px;
    border-radius: 50%; flex-shrink: 0;
  }

  .section-header.prob .dot { background: #a855f7; box-shadow: 0 0 12px #a855f7; }
  .section-header.stats .dot { background: #06b6d4; box-shadow: 0 0 12px #06b6d4; }
  .section-header.sql .dot { background: #f59e0b; box-shadow: 0 0 12px #f59e0b; }
  .section-header.python .dot { background: #10b981; box-shadow: 0 0 12px #10b981; }
  .section-header.ml .dot { background: #f43f5e; box-shadow: 0 0 12px #f43f5e; }

  .topic-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 16px 20px;
    cursor: pointer;
    transition: all 0.25s cubic-bezier(0.4,0,0.2,1);
    display: flex;
    align-items: flex-start;
    gap: 16px;
    position: relative;
    overflow: hidden;
  }

  .topic-card::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 3px;
    border-radius: 0 2px 2px 0;
    transition: opacity 0.25s;
    opacity: 0;
  }

  .topic-card.prob::before { background: #a855f7; }
  .topic-card.stats::before { background: #06b6d4; }
  .topic-card.sql::before { background: #f59e0b; }
  .topic-card.python::before { background: #10b981; }
  .topic-card.ml::before { background: #f43f5e; }

  .topic-card:hover { border-color: #3a3a5a; transform: translateY(-1px); background: var(--card2); }
  .topic-card:hover::before { opacity: 1; }

  .topic-card.done { background: rgba(16,185,129,0.04); border-color: rgba(16,185,129,0.25); }
  .topic-card.done::before { opacity: 1; background: #10b981 !important; }

  .check-box {
    width: 24px; height: 24px;
    border-radius: 8px;
    border: 2px solid var(--border);
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.25s;
    margin-top: 1px;
  }

  .topic-card.done .check-box { background: var(--done); border-color: var(--done); }

  .check-icon { color: white; font-size: 14px; opacity: 0; transform: scale(0); transition: all 0.2s; }
  .topic-card.done .check-icon { opacity: 1; transform: scale(1); }

  .topic-content { flex: 1; min-width: 0; }

  .topic-title {
    font-weight: 500;
    font-size: 0.95rem;
    line-height: 1.4;
    color: var(--text);
    transition: color 0.2s;
  }

  .topic-card.done .topic-title { color: var(--muted); text-decoration: line-through; text-decoration-color: rgba(16,185,129,0.5); }

  .subtopics { display: none; margin-top: 10px; padding: 10px 12px; background: rgba(255,255,255,0.03); border-radius: 8px; border: 1px solid var(--border); }
  .topic-card.expanded .subtopics { display: block; }

  .subtopics ul { list-style: none; display: flex; flex-direction: column; gap: 4px; }
  .subtopics li { font-size: 0.82rem; color: var(--muted); padding: 2px 0 2px 14px; position: relative; line-height: 1.4; }
  .subtopics li::before { content: '·'; position: absolute; left: 4px; color: var(--accent1); }

  .expand-btn {
    background: none; border: none; color: var(--muted);
    cursor: pointer; font-size: 18px; padding: 0 4px;
    transition: color 0.2s, transform 0.2s;
    flex-shrink: 0; margin-top: 1px;
  }
  .topic-card.expanded .expand-btn { transform: rotate(180deg); color: var(--accent2); }

  /* ===================== DSA SECTION ===================== */
  .dsa-section { display: none; }
  .dsa-section.visible { display: block; }

  .dsa-header {
    text-align: center;
    padding: 28px 0 20px;
  }

  .dsa-header h2 {
    font-family: 'Syne', sans-serif;
    font-size: 1.8rem;
    font-weight: 800;
    background: linear-gradient(135deg, #6366f1, #a78bfa);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .dsa-header p { color: var(--muted); font-size: 0.88rem; margin-top: 6px; }

  /* DSA progress bar */
  .dsa-progress-wrap { margin: 16px 0 8px; }
  .dsa-progress-label {
    display: flex; justify-content: space-between;
    font-size: 0.8rem; color: var(--muted); margin-bottom: 6px;
  }
  .dsa-progress-label span { font-family: 'Syne', sans-serif; font-weight: 700; color: #8b5cf6; }

  .dsa-bar-outer { background: var(--border); border-radius: 100px; height: 8px; overflow: hidden; }
  .dsa-bar-inner {
    height: 100%; border-radius: 100px;
    background: linear-gradient(90deg, #6366f1, #a78bfa);
    transition: width 0.4s cubic-bezier(0.4,0,0.2,1);
  }

  /* DSA search */
  .dsa-search-wrap { position: relative; margin: 16px 0 4px; }
  .dsa-search-input {
    width: 100%; background: var(--card); border: 1px solid var(--border);
    border-radius: 12px; color: var(--text); font-family: 'DM Sans', sans-serif;
    font-size: 0.88rem; padding: 10px 16px 10px 40px; outline: none;
    transition: border-color 0.2s;
  }
  .dsa-search-input:focus { border-color: #6366f1; }
  .dsa-search-icon { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: var(--muted); font-size: 15px; pointer-events: none; }

  /* DSA chapter */
  .dsa-chapter { margin-bottom: 8px; border-radius: 14px; overflow: hidden; border: 1px solid var(--border); background: var(--card); }

  .dsa-chapter-header {
    display: flex; align-items: center; gap: 12px;
    padding: 14px 18px;
    cursor: pointer;
    user-select: none;
    transition: background 0.2s;
  }
  .dsa-chapter-header:hover { background: var(--card2); }

  .chapter-icon {
    width: 36px; height: 36px; border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px; flex-shrink: 0;
  }

  .chapter-info { flex: 1; min-width: 0; }
  .chapter-name {
    font-family: 'Syne', sans-serif;
    font-size: 0.95rem; font-weight: 700;
    color: var(--text);
  }
  .chapter-sub { font-size: 0.78rem; color: var(--muted); margin-top: 2px; }

  .chapter-meta { display: flex; align-items: center; gap: 10px; }

  .chapter-done-badge {
    font-family: 'Syne', sans-serif;
    font-size: 0.75rem; font-weight: 700;
    padding: 3px 10px; border-radius: 100px;
  }

  .chapter-chevron { color: var(--muted); font-size: 16px; transition: transform 0.25s; flex-shrink: 0; }
  .dsa-chapter.open .chapter-chevron { transform: rotate(180deg); }

  .chapter-mini-bar { height: 3px; border-radius: 0 0 0 0; }

  /* Problem list inside chapter */
  .dsa-problems { display: none; border-top: 1px solid var(--border); }
  .dsa-chapter.open .dsa-problems { display: block; }

  .dsa-problem-row {
    display: flex; align-items: center; gap: 12px;
    padding: 11px 18px;
    border-bottom: 1px solid rgba(42,42,58,0.5);
    transition: background 0.15s;
    position: relative;
  }
  .dsa-problem-row:last-child { border-bottom: none; }
  .dsa-problem-row:hover { background: rgba(255,255,255,0.025); }
  .dsa-problem-row.pdone { background: rgba(16,185,129,0.04); }

  .prob-check {
    width: 20px; height: 20px; border-radius: 6px;
    border: 2px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; flex-shrink: 0;
    transition: all 0.2s;
  }
  .prob-check:hover { border-color: #6366f1; }
  .dsa-problem-row.pdone .prob-check { background: var(--done); border-color: var(--done); }
  .prob-check-icon { color: white; font-size: 11px; opacity: 0; transform: scale(0); transition: all 0.15s; }
  .dsa-problem-row.pdone .prob-check-icon { opacity: 1; transform: scale(1); }

  .prob-name {
    flex: 1; font-size: 0.875rem; color: var(--text);
    transition: color 0.2s; line-height: 1.4;
  }
  .dsa-problem-row.pdone .prob-name { color: var(--muted); text-decoration: line-through; text-decoration-color: rgba(16,185,129,0.5); }

  .prob-difficulty {
    font-size: 0.7rem; font-weight: 600;
    padding: 2px 8px; border-radius: 100px;
    flex-shrink: 0; letter-spacing: 0.3px;
  }
  .diff-easy { background: rgba(16,185,129,0.12); color: #10b981; }
  .diff-medium { background: rgba(245,158,11,0.12); color: #f59e0b; }
  .diff-hard { background: rgba(244,63,94,0.12); color: #f43f5e; }

  .prob-link {
    display: flex; align-items: center; gap: 4px;
    font-size: 0.72rem; color: #6366f1;
    text-decoration: none; padding: 3px 8px;
    border-radius: 6px; border: 1px solid rgba(99,102,241,0.25);
    transition: all 0.15s; flex-shrink: 0;
    white-space: nowrap;
  }
  .prob-link:hover { background: rgba(99,102,241,0.12); border-color: #6366f1; color: #a78bfa; }
  .prob-link.lc { border-color: rgba(245,158,11,0.25); color: #f59e0b; }
  .prob-link.lc:hover { background: rgba(245,158,11,0.1); border-color: #f59e0b; color: #fbbf24; }
  .prob-link.gfg { border-color: rgba(16,185,129,0.25); color: #10b981; }
  .prob-link.gfg:hover { background: rgba(16,185,129,0.1); border-color: #10b981; color: #34d399; }
  .prob-link.dl { border-color: rgba(245,158,11,0.25); color: #f59e0b; }
  .prob-link.dl:hover { background: rgba(245,158,11,0.1); border-color: #f59e0b; color: #fbbf24; }

  /* Motivational banner */
  .moti-banner {
    background: linear-gradient(135deg, rgba(124,58,237,0.15), rgba(6,182,212,0.1));
    border: 1px solid rgba(124,58,237,0.3);
    border-radius: 16px;
    padding: 20px 24px;
    margin: 20px 0 0;
    text-align: center;
    font-family: 'Syne', sans-serif;
    font-size: 1.1rem; font-weight: 600;
    color: var(--text);
    display: none;
  }
  .moti-banner.show { display: block; }

  /* Search (non-DSA) */
  .search-wrap { position: relative; margin-bottom: 8px; }
  .search-input {
    width: 100%; background: var(--card); border: 1px solid var(--border);
    border-radius: 12px; color: var(--text); font-family: 'DM Sans', sans-serif;
    font-size: 0.9rem; padding: 12px 16px 12px 44px; outline: none;
    transition: border-color 0.2s;
  }
  .search-input:focus { border-color: var(--accent1); }
  .search-icon { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); color: var(--muted); font-size: 18px; pointer-events: none; }

  .hidden { display: none !important; }

  /* Reset */
  .reset-area { text-align: center; margin-top: 40px; }
  .reset-btn {
    background: none; border: 1px solid var(--border);
    color: var(--muted); font-family: 'DM Sans', sans-serif;
    font-size: 0.8rem; padding: 8px 16px; border-radius: 8px;
    cursor: pointer; transition: all 0.2s;
  }
  .reset-btn:hover { border-color: var(--accent5); color: var(--accent5); }

  /* Star pop */
  .star-pop {
    position: fixed; pointer-events: none; z-index: 9999;
    font-size: 22px; animation: starfly 1s forwards;
  }
  @keyframes starfly {
    0% { opacity: 1; transform: translateY(0) scale(1); }
    100% { opacity: 0; transform: translateY(-80px) scale(1.5); }
  }

  /* No results */
  .no-results { text-align: center; color: var(--muted); padding: 40px 0; font-size: 0.9rem; }
</style>
</head>
<body>
<div class="container">
  <header>
    <h1>Saloni's Placement Prep</h1>
    <div class="progress-bar-outer">
      <div class="progress-bar-inner" id="progressBar" style="width:0%"></div>
    </div>
    <div class="progress-stats">
      <span><span class="progress-count" id="doneCount">0</span> completed</span>
      <span id="pctText">0% done</span>
      <span><span class="progress-count" id="totalCount">0</span> total</span>
    </div>
  </header>

  <div id="motiBanner" class="moti-banner">Good start — keep the momentum going.</div>

  <div class="search-wrap" id="mainSearchWrap">
    <span class="search-icon" style="font-size:15px;color:var(--muted);">&#9906;</span>
    <input class="search-input" id="searchInput" type="text" placeholder="Search topics..." />
  </div>

  <div class="section-tabs" id="tabs">
    <button class="tab-btn active" data-section="all">All <span class="tab-count" id="cnt-all">0</span></button>
    <button class="tab-btn" data-section="prob">Probability <span class="tab-count" id="cnt-prob">0</span></button>
    <button class="tab-btn" data-section="stats">Statistics <span class="tab-count" id="cnt-stats">0</span></button>
    <button class="tab-btn" data-section="sql">SQL <span class="tab-count" id="cnt-sql">0</span></button>
    <button class="tab-btn" data-section="python">Python <span class="tab-count" id="cnt-python">0</span></button>
    <button class="tab-btn" data-section="ml">ML <span class="tab-count" id="cnt-ml">0</span></button>
    <button class="tab-btn" data-section="sqlprobs">SQL Problems <span class="tab-count" id="cnt-sqlprobs">0</span></button>
    <button class="tab-btn" data-section="dsa">DSA Problems <span class="tab-count" id="cnt-dsa">0</span></button>
  </div>

  <div class="topics-list" id="topicsList"></div>

  <!-- ===================== SQL PROBLEMS SECTION ===================== -->
  <div class="dsa-section" id="sqlProbsSection">
    <div class="dsa-header">
      <h2>SQL Problems</h2>
      <p>All the Best Saloni! 🌟</p>
    </div>

    <div class="dsa-progress-wrap">
      <div class="dsa-progress-label">
        <span id="sqlpDone">0</span><span style="color:var(--muted);font-family:'DM Sans';font-weight:400"> / <span id="sqlpTotal">0</span> solved</span>
        <span id="sqlpPct">0%</span>
      </div>
      <div class="dsa-bar-outer"><div class="dsa-bar-inner" id="sqlpBar" style="width:0%;background:linear-gradient(90deg,#f59e0b,#f97316);"></div></div>
    </div>

    <div class="dsa-search-wrap">
      <span class="dsa-search-icon">⌕</span>
      <input class="dsa-search-input" id="sqlpSearchInput" type="text" placeholder="Search problems..." />
    </div>

    <div id="sqlpChapters" style="margin-top:16px;display:flex;flex-direction:column;gap:8px;"></div>
    <div id="sqlpNoResults" class="no-results hidden">No problems match your search.</div>
  </div>

  <!-- ===================== DSA SECTION ===================== -->
  <div class="dsa-section" id="dsaSection">
    <div class="dsa-header">
      <h2>DSA Problems</h2>
      <p>All the Best Saloni! 🌟</p>
    </div>

    <div class="dsa-progress-wrap">
      <div class="dsa-progress-label">
        <span id="dsaDone">0</span><span style="color:var(--muted);font-family:'DM Sans';font-weight:400"> / <span id="dsaTotal">0</span> solved</span>
        <span id="dsaPct">0%</span>
      </div>
      <div class="dsa-bar-outer"><div class="dsa-bar-inner" id="dsaBar" style="width:0%"></div></div>
    </div>

    <div class="dsa-search-wrap">
      <span class="dsa-search-icon">⌕</span>
      <input class="dsa-search-input" id="dsaSearchInput" type="text" placeholder="Search problems..." />
    </div>

    <div id="dsaChapters" style="margin-top:16px;display:flex;flex-direction:column;gap:8px;"></div>
    <div id="dsaNoResults" class="no-results hidden">No problems match your search.</div>
  </div>

  <div class="reset-area">
    <button class="reset-btn" onclick="resetAll()">Reset all progress</button>
  </div>
</div>

<script>
const STORAGE_KEY = 'saloni_placement_checklist_v1';
const DSA_STORAGE_KEY = 'saloni_dsa_checklist_v1';
const SQL_Q_STORAGE_KEY = 'saloni_sql_questions_v1';

// ======================== NON-DSA DATA ========================
const data = [
  { section: 'prob', label: 'Probability Theory', topics: [
    { title: 'Foundations of Probability', subs: ['Sample space','Events','Sigma-algebra (σ-algebra)','Axioms of probability','Probability measure','Finite vs infinite sample spaces','Countable vs uncountable spaces','Equally likely outcomes','Classical probability','Relative frequency interpretation','Subjective probability'] },

// ======================== STATE ========================
let checkedState = {};
let dsaState = {};
let sqlQState = {};
let currentSection = 'all';
let searchQuery = '';
let dsaSearchQuery = '';

function loadState() {
  try { checkedState = JSON.parse(localStorage.getItem(STORAGE_KEY)) || {}; } catch { checkedState = {}; }
  try { dsaState = JSON.parse(localStorage.getItem(DSA_STORAGE_KEY)) || {}; } catch { dsaState = {}; }
  try { sqlQState = JSON.parse(localStorage.getItem(SQL_Q_STORAGE_KEY)) || {}; } catch { sqlQState = {}; }
}

function saveState() { localStorage.setItem(STORAGE_KEY, JSON.stringify(checkedState)); }
function saveDsaState() { localStorage.setItem(DSA_STORAGE_KEY, JSON.stringify(dsaState)); }
function saveSqlQState() { localStorage.setItem(SQL_Q_STORAGE_KEY, JSON.stringify(sqlQState)); }

function getTopicKey(section, topicIdx) { return `${section}_${topicIdx}`; }
function getDsaKey(chapterId, probIdx) { return `${chapterId}_${probIdx}`; }
function getSqlQKey(diffId, qIdx) { return `sqlq_${diffId}_${qIdx}`; }

// ======================== PROGRESS ========================
function countForSection(section) {
  const sec = data.find(d => d.section === section);
  if (!sec) return { total: 0, done: 0 };
  let total = sec.topics.length, done = 0;
  sec.topics.forEach((_, i) => { if (checkedState[getTopicKey(section, i)]) done++; });
  return { total, done };
}

function countDsa() {
  let total = 0, done = 0;
  dsaChapters.forEach(ch => {
    ch.problems.forEach((_, i) => {
      total++;
      if (dsaState[getDsaKey(ch.id, i)]) done++;
    });
  });
  return { total, done };
}

function countSqlQ() {
  let total = 0, done = 0;
  sqlQuestions.forEach(diff => {
    diff.questions.forEach((_, i) => {
      total++;
      if (sqlQState[getSqlQKey(diff.id, i)]) done++;
    });
  });
  return { total, done };
}

function updateProgress() {
  let total = 0, done = 0;
  data.forEach(sec => {
    sec.topics.forEach((_, i) => {
      total++;
      if (checkedState[getTopicKey(sec.section, i)]) done++;
    });
  });

  const dsa = countDsa();
  total += dsa.total;
  done += dsa.done;

  const sqlq = countSqlQ();
  total += sqlq.total;
  done += sqlq.done;

  const pct = total ? Math.round(done / total * 100) : 0;
  document.getElementById('progressBar').style.width = pct + '%';
  document.getElementById('doneCount').textContent = done;
  document.getElementById('totalCount').textContent = total;
  document.getElementById('pctText').textContent = pct + '% done';
  document.getElementById('cnt-all').textContent = total;

  data.forEach(sec => {
    const { total: t, done: d } = countForSection(sec.section);
    const el = document.getElementById(`cnt-${sec.section}`);
    if (el) el.textContent = `${d}/${t}`;
  });

  // SQL Problems tab count
  document.getElementById('cnt-sqlprobs').textContent = `${sqlq.done}/${sqlq.total}`;

  // DSA count
  document.getElementById('cnt-dsa').textContent = `${dsa.done}/${dsa.total}`;
  document.getElementById('dsaDone').textContent = dsa.done;
  document.getElementById('dsaTotal').textContent = dsa.total;
  const dsaPct = dsa.total ? Math.round(dsa.done / dsa.total * 100) : 0;
  document.getElementById('dsaBar').style.width = dsaPct + '%';
  document.getElementById('dsaPct').textContent = dsaPct + '%';

  const banner = document.getElementById('motiBanner');
  const quotes = ["Good start — keep the momentum going.","25% done. Solid progress, keep pushing.","Halfway there. Stay consistent.","75% done. The finish line is close.","100% complete. Every topic covered."];
  if (pct === 0) { banner.classList.remove('show'); }
  else if (pct < 25) { banner.textContent = quotes[0]; banner.classList.add('show'); }
  else if (pct < 50) { banner.textContent = quotes[1]; banner.classList.add('show'); }
  else if (pct < 75) { banner.textContent = quotes[2]; banner.classList.add('show'); }
  else if (pct < 100) { banner.textContent = quotes[3]; banner.classList.add('show'); }
  else { banner.textContent = quotes[4]; banner.classList.add('show'); }
}

function spawnStar(x, y) {
  const el = document.createElement('div');
  el.className = 'star-pop';
  el.textContent = '+1';
  el.style.left = x + 'px';
  el.style.top = (y - 10) + 'px';
  el.style.color = '#10b981';
  el.style.fontFamily = "'Syne', sans-serif";
  el.style.fontWeight = '700';
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 1000);
}

// ======================== NON-DSA RENDER ========================
function renderTopics() {
  const list = document.getElementById('topicsList');
  list.innerHTML = '';
  const sectionColors = { prob: '#a855f7', stats: '#06b6d4', sql: '#f59e0b', python: '#10b981', ml: '#f43f5e' };

  data.forEach(sec => {
    if (currentSection !== 'all' && currentSection !== sec.section) return;
    const header = document.createElement('div');
    header.className = `section-header ${sec.section}`;
    header.innerHTML = `<span class="dot"></span>${sec.label}`;
    header.style.color = sectionColors[sec.section];
    let headerAdded = false;

    sec.topics.forEach((topic, i) => {
      const key = getTopicKey(sec.section, i);
      const fullText = (topic.title + ' ' + (topic.subs || []).join(' ')).toLowerCase();
      if (searchQuery && !fullText.includes(searchQuery.toLowerCase())) return;
      if (!headerAdded) { list.appendChild(header); headerAdded = true; }

      const card = document.createElement('div');
      card.className = `topic-card ${sec.section}${checkedState[key] ? ' done' : ''}`;
      const subsHtml = topic.subs && topic.subs.length
        ? `<div class="subtopics"><ul>${topic.subs.map(s => `<li>${s}</li>`).join('')}</ul></div>` : '';
      card.innerHTML = `
        <div class="check-box"><span class="check-icon">✓</span></div>
        <div class="topic-content">
          <div class="topic-title">${topic.title}</div>${subsHtml}
        </div>
        ${topic.subs && topic.subs.length ? '<button class="expand-btn" title="Show subtopics">▾</button>' : ''}
      `;
      const checkBox = card.querySelector('.check-box');
      const expandBtn = card.querySelector('.expand-btn');
      checkBox.addEventListener('click', (e) => {
        e.stopPropagation();
        checkedState[key] = !checkedState[key];
        saveState();
        card.classList.toggle('done', !!checkedState[key]);
        if (checkedState[key]) spawnStar(e.clientX, e.clientY);
        updateProgress();
      });
      if (expandBtn) {
        expandBtn.addEventListener('click', (e) => { e.stopPropagation(); card.classList.toggle('expanded'); });
        card.querySelector('.topic-content').addEventListener('click', () => card.classList.toggle('expanded'));
      }
      list.appendChild(card);
    });
  });
}

  if (d === 'easy') return 'diff-easy';

function getLinkHtml(prob) {
  let links = '';
  if (prob.lc) links += `<a class="prob-link lc" href="${prob.lc}" target="_blank" rel="noopener">LC ↗</a>`;
  if (prob.gfg) links += `<a class="prob-link gfg" href="${prob.gfg}" target="_blank" rel="noopener">GFG ↗</a>`;

}

}

        </div>
        <div class="chapter-meta">
          <span class="chapter-done-badge" style="background:${badgeBg};color:${badgeColor};border:1px solid ${badgeColor}33;">
            ${done}/${total}
          </span>
          <span class="chapter-chevron">▾</span>
        </div>
      </div>
      <div class="dsa-problems" id="sqlpprobs-${diff.id}"></div>
    `;

    chEl.querySelector('.dsa-chapter-header').addEventListener('click', () => chEl.classList.toggle('open'));
    const probsContainer = chEl.querySelector(`#sqlpprobs-${diff.id}`);

    const questionsToShow = sqlpSearchQuery ? filtered : diff.questions;
    questionsToShow.forEach((q, rawIdx) => {
      const i = sqlpSearchQuery ? diff.questions.indexOf(q) : rawIdx;
      const key = getSqlQKey(diff.id, i);
      const row = document.createElement('div');
      row.className = `dsa-problem-row${sqlQState[key] ? ' pdone' : ''}`;
      row.innerHTML = `
        <div class="prob-check" title="Mark as done"><span class="prob-check-icon">✓</span></div>
        <span class="prob-name">${q.title}</span>
        <a class="prob-link dl" href="${q.url}" target="_blank" rel="noopener">Solve ↗</a>
      `;
      const check = row.querySelector('.prob-check');
      check.addEventListener('click', (e) => {
        e.stopPropagation();
        sqlQState[key] = !sqlQState[key];
        saveSqlQState();
        row.classList.toggle('pdone', !!sqlQState[key]);
        if (sqlQState[key]) spawnStar(e.clientX, e.clientY);
        const newDone = getSqlDiffDoneCount(diff);
        const badge = chEl.querySelector('.chapter-done-badge');
        badge.textContent = `${newDone}/${total}`;
        const newBadgeBg = newDone === total ? 'rgba(16,185,129,0.15)' : `${diff.color}22`;
        const newBadgeColor = newDone === total ? '#10b981' : diff.color;
        badge.style.background = newBadgeBg;
        badge.style.color = newBadgeColor;
        badge.style.borderColor = newBadgeColor + '33';
        updateProgress();
      });
      probsContainer.appendChild(row);
    });

    if (sqlpSearchQuery) chEl.classList.add('open');
    container.appendChild(chEl);
  });

  noResults.classList.toggle('hidden', anyVisible);

  // Update progress bar inside section
  const sqlq = countSqlQ();
  document.getElementById('sqlpDone').textContent = sqlq.done;
  document.getElementById('sqlpTotal').textContent = sqlq.total;
  const pct = sqlq.total ? Math.round(sqlq.done / sqlq.total * 100) : 0;
  document.getElementById('sqlpBar').style.width = pct + '%';
  document.getElementById('sqlpPct').textContent = pct + '%';
}

function renderDsa() {
  const container = document.getElementById('dsaChapters');
  const noResults = document.getElementById('dsaNoResults');
  container.innerHTML = '';
  let anyVisible = false;

  dsaChapters.forEach(ch => {
    const filtered = dsaSearchQuery
      ? ch.problems.filter(p => p.title.toLowerCase().includes(dsaSearchQuery.toLowerCase()))
      : ch.problems;

    if (dsaSearchQuery && filtered.length === 0) return;
    anyVisible = true;

    const done = getChapterDoneCount(ch);
    const total = ch.problems.length;
    const pct = total ? Math.round(done / total * 100) : 0;

    const chEl = document.createElement('div');
    chEl.className = 'dsa-chapter';
    chEl.dataset.id = ch.id;

    const badgeBg = done === total && total > 0
      ? 'rgba(16,185,129,0.15)' : 'rgba(99,102,241,0.12)';
    const badgeColor = done === total && total > 0 ? '#10b981' : ch.color;

    chEl.innerHTML = `
      <div class="chapter-mini-bar" style="background:linear-gradient(90deg,${ch.color},transparent);opacity:0.5;"></div>
      <div class="dsa-chapter-header">
        <div class="chapter-icon" style="background:${ch.color}22;color:${ch.color};">${ch.icon}</div>
        <div class="chapter-info">
          <div class="chapter-name">${ch.name}</div>
          <div class="chapter-sub">${total} problems</div>
        </div>
        <div class="chapter-meta">
          <span class="chapter-done-badge" style="background:${badgeBg};color:${badgeColor};border:1px solid ${badgeColor}33;">
            ${done}/${total}
          </span>
          <span class="chapter-chevron">▾</span>
        </div>
      </div>
      <div class="dsa-problems" id="probs-${ch.id}"></div>
    `;

    const header = chEl.querySelector('.dsa-chapter-header');
    header.addEventListener('click', () => chEl.classList.toggle('open'));

    const probsContainer = chEl.querySelector(`#probs-${ch.id}`);

    const problemsToShow = dsaSearchQuery ? filtered : ch.problems;
    problemsToShow.forEach((prob, rawIdx) => {
      const i = dsaSearchQuery ? ch.problems.indexOf(prob) : rawIdx;
      const key = getDsaKey(ch.id, i);
      const row = document.createElement('div');
      row.className = `dsa-problem-row${dsaState[key] ? ' pdone' : ''}`;
      row.innerHTML = `
        <div class="prob-check" title="Mark as done"><span class="prob-check-icon">✓</span></div>
        <span class="prob-name">${prob.title}</span>
        <span class="prob-difficulty ${diffClass(prob.d)}">${prob.d}</span>
        ${getLinkHtml(prob)}
      `;
      const check = row.querySelector('.prob-check');
      check.addEventListener('click', (e) => {
        e.stopPropagation();
        dsaState[key] = !dsaState[key];
        saveDsaState();
        row.classList.toggle('pdone', !!dsaState[key]);
        if (dsaState[key]) spawnStar(e.clientX, e.clientY);
        // Update chapter badge
        const newDone = getChapterDoneCount(ch);
        const badge = chEl.querySelector('.chapter-done-badge');
        badge.textContent = `${newDone}/${total}`;
        const newBadgeBg = newDone === total ? 'rgba(16,185,129,0.15)' : 'rgba(99,102,241,0.12)';
        const newBadgeColor = newDone === total ? '#10b981' : ch.color;
        badge.style.background = newBadgeBg;
        badge.style.color = newBadgeColor;
        badge.style.borderColor = newBadgeColor + '33';
        updateProgress();
      });
      probsContainer.appendChild(row);
    });

    if (dsaSearchQuery) chEl.classList.add('open');
    container.appendChild(chEl);
  });

  noResults.classList.toggle('hidden', anyVisible);
}

// ======================== TABS ========================
document.getElementById('tabs').addEventListener('click', (e) => {
  const btn = e.target.closest('.tab-btn');
  if (!btn) return;
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  currentSection = btn.dataset.section;

  const dsaSection = document.getElementById('dsaSection');
  const sqlProbsSection = document.getElementById('sqlProbsSection');
  const topicsList = document.getElementById('topicsList');
  const mainSearchWrap = document.getElementById('mainSearchWrap');
  const motiBanner = document.getElementById('motiBanner');

  if (currentSection === 'dsa') {
    dsaSection.classList.add('visible');
    sqlProbsSection.classList.remove('visible');
    topicsList.style.display = 'none';
    mainSearchWrap.style.display = 'none';
    motiBanner.style.display = 'none';
    renderDsa();
  } else if (currentSection === 'sqlprobs') {
    sqlProbsSection.classList.add('visible');
    dsaSection.classList.remove('visible');
    topicsList.style.display = 'none';
    mainSearchWrap.style.display = 'none';
    motiBanner.style.display = 'none';
    renderSqlProbs();
  } else {
    dsaSection.classList.remove('visible');
    sqlProbsSection.classList.remove('visible');
    topicsList.style.display = '';
    mainSearchWrap.style.display = '';
    motiBanner.style.display = '';
    renderTopics();
  }
});

// Search (non-DSA)
document.getElementById('searchInput').addEventListener('input', (e) => {
  searchQuery = e.target.value.trim();
  renderTopics();
});

// DSA search
document.getElementById('dsaSearchInput').addEventListener('input', (e) => {
  dsaSearchQuery = e.target.value.trim();
  renderDsa();
});

// SQL Problems search
document.getElementById('sqlpSearchInput').addEventListener('input', (e) => {
  sqlpSearchQuery = e.target.value.trim();
  renderSqlProbs();
});

// Reset
function resetAll() {
  if (confirm('Reset all progress? This cannot be undone.')) {
    checkedState = {}; dsaState = {}; sqlQState = {};
    saveState(); saveDsaState(); saveSqlQState();
    renderTopics(); renderDsa(); renderSqlProbs();
    updateProgress();
  }
}

// ======================== INIT ========================
loadState();
renderTopics();
renderDsa();
renderSqlProbs();
updateProgress();
</script>
</body>
</html>
